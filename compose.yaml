services:
  api:
    build:
      context: .
      dockerfile: Portal.HttpApi/Dockerfile.Development
    container_name: multitenants-api
    ports:
      - "5089:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
    depends_on:
      postgresql:
        condition: service_healthy
      mongodb:
        condition: service_started
    networks:
      - multitenants-network

  postgresql:
    image: postgres:16-alpine
    container_name: multitenants-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: multitenants_identity
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d multitenants_identity"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - multitenants-network

  mongodb:
    image: mongo:7.0
    container_name: multitenants-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: multitenants
    volumes:
      - mongodb_data:/data/db
    networks:
      - multitenants-network

  redis:
    image: redis:7-alpine
    container_name: multitenants-redis
    profiles:
      - optional
    ports:
      - "6379:6379"
    networks:
      - multitenants-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: multitenants-rabbitmq
    profiles:
      - optional
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    networks:
      - multitenants-network

volumes:
  postgres_data:
  mongodb_data:

networks:
  multitenants-network:
    driver: bridge
